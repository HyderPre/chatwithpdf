<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatwithPDF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-file-pdf"></i>
                </div>
                <h2>ChatwithPDF</h2>
            </div>
            <div class="sidebar-divider"></div>
            <h3>Recent Chats</h3>
            <div class="chat-history" id="chat-history">
                <!-- Chat history items will be added here -->
            </div>
            <div class="new-chat-btn">
                <button id="new-chat"><i class="fas fa-plus"></i> New Chat</button>
            </div>
        </div>
      
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <div class="header-title">
                    <h1>Chat with your PDF</h1>
                    <p>Upload a PDF and start asking questions</p>
                </div>
                <!-- <div class="user-profile">
                    <button class="user-avatar" id="user-button">HP </button>
                    <div class="user-dropdown" id="user-dropdown">
                        <ul>
                            <li><i class="fas fa-user-cog"></i> Settings</li>
                            <li><i class="fas fa-crown"></i> Buy Premium</li>
                            <li id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</li>
                        </ul>
                    </div>
                </div> -->
                <div class="user-profile">
                    {% if user_data.photo %}
                        <button class="user-avatar" id="user-button">
                            <img src="{{ user_data.photo }}" alt="User Photo" style="border-radius: 50%; width: 35px; height: 35px;">
                        </button>
                    {% else %}
                        <button class="user-avatar" id="user-button">
                            {{ user_data.name|default('HP', true)|first|upper }}{{ user_data.name|default('HP', true)|split(' ')|last|first|upper if ' ' in user_data.name|default('', true) }}
                        </button>
                    {% endif %}
                
                    <div class="user-dropdown" id="user-dropdown">
                        <ul>
                            <li><i class="fas fa-user-cog"></i> Settings</li>
                            <li><i class="fas fa-crown"></i> Buy Premium</li>
                            <li id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</li>
                        </ul>
                    </div>
                </div>
                
                
            </header>

            <!-- Chat Interface -->
            <main>
                <!-- Model Selection and PDF Upload -->
                <div class="control-panel">
                    <div class="model-selection">
                        <label for="model">AI Model</label>
                        <div class="select-wrapper">
                            <select id="model">
                                <option value="">Select AI Model</option>
                                <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                                <option value="gpt-4">GPT-4</option>
                                <option value="claude-3.7-sonnet">Claude 3.7 Sonnet</option>
                                <option value="llama-3.3">Llama 3.3</option>
                                <option value="deepseek-grm">DeepSeek GRM</option>
                            </select>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>

                    <div class="pdf-upload">
                        <label for="pdf-file">PDF Document</label>
                        <div class="upload-container">
                            <div class="file-input-wrapper">
                                <input type="file" id="pdf-file" accept=".pdf" required>
                                <div class="file-input-label">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <span id="file-name">Choose file...</span>
                                </div>
                            </div>
                            <button type="submit" id="upload-btn">Upload</button>
                        </div>
                    </div>
                </div>

                <!-- Welcome message or empty state -->
                <div class="welcome-container" id="welcome-container">
                    <div class="welcome-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h2>Start a conversation</h2>
                    <p>Upload a PDF and ask questions about its content</p>
                </div>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chat-messages"></div>

                <!-- Chat Input -->
                <div class="chat-input-container">
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Ask a question about the PDF...">
                        <button type="submit" id="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
  
</body>
</html>
